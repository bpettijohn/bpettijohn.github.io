---
layout: page
title: Testimonials
permalink: /testimonials/
---
<section class="container">
    <div class="row">
        <div class="col-12">
            {% for testimonial in site.data.testimonials.testimonials %}
                <div class="testimonial">
                    <p>{{ testimonial.text }}</p>
                    <div class="name">{{ testimonial.name}}, <span>{{ testimonial.company }}</span></div>
                </div>
            {% endfor %}
        </div>
    </div>
</section>
